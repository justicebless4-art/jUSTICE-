        }

        .gallery img {

            object-fit: cover;

        }

        }

        footer {

            color: white;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            header h1 {

            }

                height: auto;
            }
